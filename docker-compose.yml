# Production stack — Cgroup limits enforced via --compatibility flag
version: "3.8"
services:
  api:
    build:
      context: .
    image: node-api-hardened:v1.0.0
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - NODE_ENV=production
